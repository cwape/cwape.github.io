<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LacyBot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./favicon.png" type="image/png">
</head>

<body>
    <header class="main-header">
        <div class="header-inner">
            <div class="nav-section left">
                <button class="hamburger-btn" onclick="toggleNavMenu()">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>

                <div id="navDropdown" class="nav-content">
                    <a href="statcalc.html">레벨 포인트</a>
                    <a href="hero-legend.html">영웅 강화</a>
                    <a href="hero-skill.html">영웅 스킬</a>
                    <a href="one-level.html">유일 레벨</a>

                    <div class="menu-dark-mode">
                        <span class="theme-text">Dark Mode</span>
                        <label class="theme-switch">
                            <input type="checkbox" id="darkModeToggle">
                            <div class="slider round"></div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="nav-section center">
                <a href="index.html" class="logo-badge">Racy Bot</a>
            </div>

            <div class="nav-section right"></div>
        </div>
    </header>

    <div class="skills-container">
        <h2 class="page-title">영웅별 상세 스킬 정보</h2>

        <div class="hero-app-layout">
            <!-- 왼쪽: 영웅 선택 목록 -->
            <div id="hero-selector" class="hero-grid">
                <!-- JS에서 이미지가 삽입됩니다 -->
            </div>

            <!-- 오른쪽: 스킬 상세 정보 (처음엔 비어있거나 안내 문구) -->
            <div id="hero-detail" class="hero-detail-card">
                <div id="detail-content">
                    <p class="placeholder-text">영웅을 선택하시면<br>스킬 정보가 표시됩니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
