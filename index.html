<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최적 스탯 분배 계산기</title>
    <style>
        :root { --primary: #2ea44f; --bg: #f6f8fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 8px; border: 1px solid #d0d7de; width: 100%; max-width: 500px; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: #24292f; }
        .section { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 13px; font-weight: bold; color: #57606a; display: block; margin-bottom: 4px; }
        input { width: 90%; padding: 8px; border: 1px solid #d0d7de; border-radius: 6px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2c974b; }
        .result-box { margin-top: 20px; padding: 15px; background: #f0f7ff; border-radius: 6px; border: 1px solid #0969da; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .val { font-weight: bold; color: #0969da; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚔️ 최적 스탯 계산기</h2>
    
    <div class="section">
        <label>최대 스탯 포인트 (pt_max)</label>
        <input type="number" id="pt_max" value="100">
        
        <div class="grid">
            <div><label>공격력 포인트 (pt_atk)</label><input type="number" id="pt_atk" value="0"></div>
            <div><label>치피 포인트 (pt_crit_dmg)</label><input type="number" id="pt_crit_dmg" value="0"></div>
            <div><label>체력 포인트 (pt_hp)</label><input type="number" id="pt_hp" value="0"></div>
            <div><label>체력 고정 수치 (fix_pt_hp)</label><input type="number" id="fix_pt_hp" value="0"></div>
        </div>
    </div>

    <div class="section">
        <label>현재 스탯 정보</label>
        <div class="grid">
            <div><label>현재 공격력</label><input type="number" id="cur_atk" value="10000"></div>
            <div><label>현재 체력</label><input type="number" id="cur_hp" value="50000"></div>
            <div><label>현재 치피(%)</label><input type="number" id="cur_crit_dmg" value="150"></div>
            <div><label>공격 증폭(%)</label><input type="number" id="atk_inc" value="0" step="0.1"></div>
            <div><label>체력 증폭(%)</label><input type="number" id="hp_inc" value="0" step="0.1"></div>
            <div><label>체력비례공격(%)</label><input type="number" id="hp_conv_atk" value="0.5" step="0.1"></div>
        </div>
    </div>

    <button onclick="calculate()">최적 스탯 계산하기</button>

    <div id="results" class="result-box" style="display:none;">
        <h3 style="margin-top:0">📊 결과 리포트</h3>
        <div class="result-item"><span>최종 공격력 포인트:</span> <span class="val" id="res_f_atk_pt"></span></div>
        <div class="result-item"><span>최종 치피 포인트:</span> <span class="val" id="res_f_crit_pt"></span></div>
        <div class="result-item"><span>최종 체력 포인트:</span> <span class="val" id="res_f_hp_pt"></span></div>
        <hr>
        <div class="result-item"><span>반영 후 공격력:</span> <span class="val" id="res_ref_atk"></span></div>
        <div class="result-item"><span>반영 후 치명피해:</span> <span class="val" id="res_ref_crit"></span></div>
        <div class="result-item"><span>반영 후 체력:</span> <span class="val" id="res_ref_hp"></span></div>
    </div>
</div>

<script>
function calculate() {
    // 상수 설정
    const atk_per_pt = 700;
    const hp_per_pt = 7000;
    const crit_dmg_per_pt = 7;

    // 입력값 가져오기
    const v = {
        pt_max: Number(document.getElementById('pt_max').value),
        pt_atk: Number(document.getElementById('pt_atk').value),
        pt_crit_dmg: Number(document.getElementById('pt_crit_dmg').value),
        pt_hp: Number(document.getElementById('pt_hp').value),
        fix_pt_hp: Number(document.getElementById('fix_pt_hp').value),
        cur_atk: Number(document.getElementById('cur_atk').value),
        cur_hp: Number(document.getElementById('cur_hp').value),
        cur_crit_dmg: Number(document.getElementById('cur_crit_dmg').value),
        atk_inc: Number(document.getElementById('atk_inc').value),
        hp_inc: Number(document.getElementById('hp_inc').value),
        hp_conv_atk: Number(document.getElementById('hp_conv_atk').value)
    };

    // 중간 계산 (보내주신 공식 적용)
    let calc1 = v.cur_atk - hp_per_pt * v.pt_hp * (1 + v.atk_inc / 100) * v.hp_conv_atk / 100;
    let calc2 = calc1 + hp_per_pt * v.fix_pt_hp * (1 + v.atk_inc / 100) * v.hp_conv_atk / 100;
    let calc3 = v.cur_crit_dmg + crit_dmg_per_pt * (v.pt_hp - v.fix_pt_hp);

    // 최적화 스탯 계산 (분모 0 방지 및 반올림)
    let denom = (2 * crit_dmg_per_pt / 100 * atk_per_pt * (1 + v.atk_inc / 100));
    let calc_atk = Math.round(((atk_per_pt * (1 + v.atk_inc / 100) * (1 + calc3 / 100) - (crit_dmg_per_pt / 100 * calc2))) / denom);

    // 보정치 계산
    let calc_atk_cor;
    if (calc_atk + v.pt_atk >= v.pt_max - v.fix_pt_hp) {
        calc_atk_cor = v.pt_max - v.fix_pt_hp - v.pt_atk;
    } else if (calc_atk + v.pt_atk <= 0) {
        calc_atk_cor = -v.pt_atk;
    } else {
        calc_atk_cor = calc_atk;
    }

    // 결과 변수 확정
    let final_atk_pt = calc_atk_cor + v.pt_atk;
    let final_hp_pt = v.fix_pt_hp;
    let final_crit_dmg_pt = v.pt_max - final_atk_pt - final_hp_pt;

    // 최종 영웅 스탯
    let ref_atk = (v.cur_atk + (atk_per_pt * (final_atk_pt - v.pt_atk)) + (hp_per_pt * v.hp_conv_atk / 100 * (final_hp_pt - v.pt_hp))) * (1 + v.atk_inc / 100);
    let ref_crit_dmg = v.cur_crit_dmg + (final_crit_dmg_pt - v.pt_crit_dmg) * crit_dmg_per_pt;
    let ref_hp = v.cur_hp + (final_hp_pt - v.pt_hp) * hp_per_pt * (1 + v.hp_inc / 100);

    // 화면 출력
    document.getElementById('res_f_atk_pt').innerText = final_atk_pt;
    document.getElementById('res_f_crit_pt').innerText = final_crit_dmg_pt;
    document.getElementById('res_f_hp_pt').innerText = final_hp_pt;
    document.getElementById('res_ref_atk').innerText = Math.floor(ref_atk).toLocaleString();
    document.getElementById('res_ref_crit').innerText = ref_crit_dmg.toFixed(1) + "%";
    document.getElementById('res_ref_hp').innerText = Math.floor(ref_hp).toLocaleString();
    document.getElementById('results').style.display = 'block';
}
</script>

</body>
</html>
